<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Local</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="mx-auto flex min-h-screen w-full max-w-7xl gap-4 px-4 py-5 sm:px-6 lg:px-8">
    <aside class="hidden w-72 shrink-0 rounded-3xl bg-white/90 p-4 shadow-sm ring-1 ring-slate-200 backdrop-blur md:flex md:flex-col">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-teal-700">Chat local</p>
        <h1 class="mt-2 text-xl font-bold">Conversas</h1>
      </div>
      <button id="newChatBtn" type="button" class="mt-4 rounded-xl bg-teal-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-teal-700">+ Nova aba</button>
      <div id="chatTabs" class="mt-4 flex-1 space-y-2 overflow-y-auto"></div>
      <button id="duplicateBtn" type="button" class="mt-3 rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Duplicar aba</button>
      <button id="renameBtn" type="button" class="mt-3 rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Renomear aba</button>
      <button id="deleteBtn" type="button" class="mt-2 rounded-xl border border-rose-300 px-4 py-2 text-sm font-semibold text-rose-700 transition hover:bg-rose-50">Excluir aba</button>
      <button id="exportBtn" type="button" class="mt-3 rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Exportar Markdown</button>
    </aside>

    <main class="flex min-h-0 flex-1 flex-col rounded-3xl bg-white/95 shadow-sm ring-1 ring-slate-200 backdrop-blur">
      <header class="border-b border-slate-200 px-4 py-4 sm:px-6">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h2 class="text-xl font-bold sm:text-2xl">Assistente com streaming em tempo real</h2>
            <p class="mt-1 text-sm text-slate-600">Tema segue o sistema, com suporte a abas, voz, imagem e exportacao.</p>
          </div>
          <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600 ring-1 ring-slate-200">Modo automatico</span>
        </div>
      </header>

      <section class="border-b border-slate-200 px-4 py-3 md:hidden">
        <div class="flex gap-2">
          <button id="newChatBtnMobile" type="button" class="rounded-xl bg-teal-600 px-3 py-2 text-sm font-semibold text-white">+ Nova aba</button>
          <button id="duplicateBtnMobile" type="button" class="rounded-xl border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700">Duplicar</button>
          <button id="renameBtnMobile" type="button" class="rounded-xl border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700">Renomear</button>
          <button id="deleteBtnMobile" type="button" class="rounded-xl border border-rose-300 px-3 py-2 text-sm font-semibold text-rose-700">Excluir</button>
          <button id="exportBtnMobile" type="button" class="rounded-xl border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700">Exportar MD</button>
        </div>
        <div id="chatTabsMobile" class="mt-3 flex gap-2 overflow-x-auto pb-1"></div>
      </section>

      <section class="grid gap-3 border-b border-slate-200 px-4 py-4 sm:grid-cols-2 lg:grid-cols-5 sm:px-6">
        <label class="flex flex-col gap-2">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-600">Temperatura</span>
          <input id="temp" type="number" min="0" max="2" step="0.1" value="0.7" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-200">
        </label>
        <label class="flex flex-col gap-2">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-600">Modelo</span>
          <select id="modelo" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-200">
            <option value="meu-llama3">meu-llama3</option>
            <option value="llama3">llama3</option>
            <option value="mistral">mistral</option>
            <option value="llava">llava</option>
          </select>
        </label>
        <label class="flex flex-col gap-2">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-600">Contexto</span>
          <input id="ctx" type="number" min="256" step="128" value="2048" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-200">
        </label>
        <label class="flex flex-col gap-2">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-600">Imagem (opcional)</span>
          <input id="imageInput" type="file" accept="image/*" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-xs text-slate-600 outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-200">
        </label>
        <div class="flex flex-col gap-2">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-600">Entrada de voz</span>
          <button id="voiceBtn" type="button" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Iniciar ditado</button>
        </div>
      </section>

      <div id="chat" class="flex-1 space-y-3 overflow-y-auto p-4 sm:p-6"></div>

      <div id="typing" class="typing hidden items-center gap-2 px-6 pb-2 text-sm text-slate-500">
        <span>IA esta digitando</span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <footer class="border-t border-slate-200 p-4 sm:p-6">
        <div class="grid gap-3 sm:grid-cols-[1fr_auto]">
          <textarea id="msg" rows="2" placeholder="Digite sua mensagem..." class="w-full resize-none rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-200"></textarea>
          <div class="flex flex-wrap gap-2">
            <button id="sendBtn" type="button" onclick="enviar()" class="rounded-xl bg-teal-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-teal-700 disabled:cursor-not-allowed disabled:opacity-60">Enviar</button>
            <button id="resetBtn" type="button" onclick="resetar()" class="rounded-xl border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Limpar</button>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <div id="duplicateModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/50 p-4" role="dialog" aria-modal="true" aria-labelledby="duplicateModalTitle">
    <div class="w-full max-w-md rounded-2xl bg-white p-5 shadow-xl ring-1 ring-slate-200 sm:p-6" role="document">
      <h3 id="duplicateModalTitle" class="text-lg font-bold text-slate-900">Duplicar aba</h3>
      <p class="mt-2 text-sm text-slate-600">Escolha o nome da nova aba e o tipo de historico que deseja copiar.</p>

      <label class="mt-4 block">
        <span class="text-xs font-semibold uppercase tracking-wide text-slate-600">Nome da nova aba</span>
        <input id="duplicateTitleInput" type="text" class="mt-2 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-200" />
      </label>

      <fieldset class="mt-4">
        <legend class="text-xs font-semibold uppercase tracking-wide text-slate-600">Tipo de duplicacao</legend>
        <label class="mt-2 flex items-center gap-2 rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-700">
          <input id="duplicateModeFull" type="radio" name="duplicateMode" value="full" checked />
          <span>Conversa completa</span>
        </label>
        <label class="mt-2 flex items-center gap-2 rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-700">
          <input id="duplicateModeUser" type="radio" name="duplicateMode" value="user" />
          <span>Apenas mensagens do usuario</span>
        </label>
      </fieldset>

      <div class="mt-6 flex justify-end gap-2">
        <button id="duplicateCancelBtn" type="button" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Cancelar</button>
        <button id="duplicateConfirmBtn" type="button" class="rounded-xl bg-teal-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-teal-700">Duplicar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
