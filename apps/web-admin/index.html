<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dashboard de Administração do Servidor" />
    <title>Server Admin · Dashboard</title>
    <!-- Usa a mesma configuração de fonte do app web principal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="bg-[#030712] text-slate-200 antialiased min-h-screen flex hidden-scrollbar" id="app-root">
    
    <!-- Efeito Neural Background global (O dashboard também o terá, porém mais sutil) -->
    <div class="fixed inset-0 z-[-1] pointer-events-none opacity-40">
      <div class="absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_20%_0%,rgba(99,102,241,0.15)_0%,transparent_65%)]"></div>
      <div class="absolute inset-0 bg-[radial-gradient(ellipse_60%_50%_at_80%_100%,rgba(34,211,238,0.1)_0%,transparent_65%)]"></div>
    </div>

    <!-- Interface carregada dinamicamente via JS -->
    <div id="app" class="w-full flex">
      <!-- Loading State Inicial Profissional -->
      <div class="flex-1 flex flex-col items-center justify-center min-h-screen gap-4 transition-opacity duration-500" id="initial-loader">
        <div class="relative w-16 h-16">
          <div class="absolute inset-0 rounded-full border-t-2 border-cyan-400 animate-spin"></div>
          <div class="absolute inset-2 rounded-full border-r-2 border-indigo-400 animate-spin" style="animation-direction: reverse; animation-duration: 1.5s;"></div>
          <div class="absolute inset-4 rounded-full border-b-2 border-violet-400 animate-spin"></div>
        </div>
        <div class="flex flex-col items-center">
          <h1 class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 via-indigo-400 to-violet-400">
            Conectando ao Kernel
          </h1>
          <p class="text-xs text-slate-500 tracking-widest uppercase mt-1">Carregando telemetria...</p>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
