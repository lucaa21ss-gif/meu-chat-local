name: meu-chat-local

services:
  ollama:
    image: ollama/ollama:latest
    container_name: meu-chat-local-ollama
    volumes:
      - ollama_data:/root/.ollama
      - ../../ollama:/models
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - meu-chat-local-net
    restart: unless-stopped

  server-dev:
    profiles: ["dev"]
    image: node:20-alpine
    container_name: meu-chat-local-api-dev
    working_dir: /workspace
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - FRONTEND_ORIGIN=http://localhost:5173,http://127.0.0.1:5173
    command:
      [
        "sh",
        "-lc",
        "if [ ! -d node_modules ] || [ ! -d apps/api/node_modules ]; then npm ci; fi && npm run dev --workspace apps/api",
      ]
    volumes:
      - ../..:/workspace
      - node_modules_cache:/workspace/node_modules
      - node_modules_api_cache:/workspace/apps/api/node_modules
      - node_modules_web_cache:/workspace/apps/web/node_modules
    ports:
      - "4000:4000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - meu-chat-local-net
    restart: unless-stopped

  web-dev:
    profiles: ["dev"]
    image: node:20-alpine
    container_name: meu-chat-local-web-dev
    working_dir: /workspace
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_PROXY_TARGET=http://server-dev:4000
    command:
      [
        "sh",
        "-lc",
        "if [ ! -d node_modules ] || [ ! -d apps/web/node_modules ]; then npm ci; fi && npm run dev --workspace apps/web -- --host 0.0.0.0 --port 5173 --strictPort",
      ]
    volumes:
      - ../..:/workspace
      - node_modules_cache:/workspace/node_modules
      - node_modules_web_cache:/workspace/apps/web/node_modules
      - node_modules_api_cache:/workspace/apps/api/node_modules
    ports:
      - "5173:5173"
    depends_on:
      server-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - meu-chat-local-net
    restart: unless-stopped

  server:
    image: meu-chat-local-api:local
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: meu-chat-local-api
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - NODE_ENV=production
      - LOG_LEVEL=info
      - FRONTEND_ORIGIN=http://localhost:4000,http://127.0.0.1:4000,http://localhost:4173,http://127.0.0.1:4173
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - meu-chat-local-net
    restart: unless-stopped

  web:
    image: meu-chat-local-web:local
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: meu-chat-local-web
    ports:
      - "4173:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - meu-chat-local-net
    restart: unless-stopped

volumes:
  ollama_data:
    name: meu-chat-local-ollama-data
  node_modules_cache:
    name: meu-chat-local-node-modules
  node_modules_api_cache:
    name: meu-chat-local-api-node-modules
  node_modules_web_cache:
    name: meu-chat-local-web-node-modules

networks:
  meu-chat-local-net:
    name: meu-chat-local-net
