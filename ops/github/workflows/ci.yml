name: CI

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - "**/*.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root tooling
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint

      - name: Check formatting (advisory)
        continue-on-error: true
        run: npm run format:check

  skill-governance:
    name: Skill Governance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root tooling
        run: npm ci

      - name: Run skill validator tests
        run: npm run test:skills:validator

      - name: Validate skills (strict)
        run: node scripts/skill-validator.mjs --strict | tee skill-validator-report.txt

      - name: Upload skill validator report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-validator-report
          path: skill-validator-report.txt

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: root
            workingDirectory: .
            lockfile: package-lock.json
          - target: api
            workingDirectory: apps/api
            lockfile: apps/api/package-lock.json
          - target: web
            workingDirectory: apps/web
            lockfile: apps/web/package-lock.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install dependencies (${{ matrix.target }})
        working-directory: ${{ matrix.workingDirectory }}
        run: npm ci

      - name: Run npm audit (${{ matrix.target }})
        id: npm_audit
        working-directory: ${{ matrix.workingDirectory }}
        run: |
          set +e
          npm audit --audit-level=high --json > "${{ github.workspace }}/npm-audit-${{ matrix.target }}.json"
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload npm audit report (${{ matrix.target }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ matrix.target }}
          path: npm-audit-${{ matrix.target }}.json

      - name: Enforce high/critical policy (${{ matrix.target }})
        if: steps.npm_audit.outputs.status != '0'
        run: |
          echo "Falha no npm audit para ${{ matrix.target }} (nivel high/critical)."
          exit 1

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: root
            workingDirectory: .
            lockfile: package-lock.json
          - target: api
            workingDirectory: apps/api
            lockfile: apps/api/package-lock.json
          - target: web
            workingDirectory: apps/web
            lockfile: apps/web/package-lock.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install dependencies (${{ matrix.target }})
        working-directory: ${{ matrix.workingDirectory }}
        run: npm ci

      - name: Generate SBOM (${{ matrix.target }})
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format json \
            --output-file "${{ github.workspace }}/sbom-${{ matrix.target }}.json" \
            --package-lock-only
        working-directory: ${{ matrix.workingDirectory }}

      - name: Upload SBOM (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.target }}
          path: sbom-${{ matrix.target }}.json

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspaces)
        run: npm ci

      - name: Run backend tests
        working-directory: apps/api
        run: npm test

  operational-health-check:
    name: Operational Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - backend-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspaces)
        run: npm ci

      - name: Run operational health verification
        run: npm run verify:health

  frontend-build:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspaces)
        run: npm ci

      - name: Build frontend CSS
        working-directory: apps/web
        run: npm run build:css

      - name: Validate frontend script syntax
        run: node --check apps/web/script.js

      - name: Validate required UI entrypoints
        run: |
          grep -q 'id="msg"' apps/web/index.html
          grep -q 'id="sendBtn"' apps/web/index.html
          grep -q 'id="chat"' apps/web/index.html

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose file
        run: docker compose -f ops/docker/docker-compose.yml config -q

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: meu-chat-local-api:ci

  supply-chain-artifacts:
    name: Supply Chain Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root tooling
        run: npm ci

      - name: Validate distribution scripts wiring
        run: |
          set -euo pipefail

          required_files=(
            "ops/docker/docker-compose.yml"
            "apps/api/package.json"
            "apps/api/package-lock.json"
            "apps/web/package.json"
            "apps/web/package-lock.json"
            "ops/scripts/local/install.sh"
            "ops/scripts/local/start.sh"
            "ops/scripts/local/stop.sh"
            "ops/scripts/local/uninstall.sh"
            "ops/scripts/local/package-dist.sh"
          )

          for file in "${required_files[@]}"; do
            [[ -f "$file" ]] || { echo "Arquivo obrigatorio ausente: $file"; exit 1; }
          done

          for script in ops/scripts/local/*.sh; do
            bash -n "$script"
          done

          node --check ops/scripts/local/release-canary.mjs
          node --check ops/scripts/local/capacity-profile.mjs

          grep -q 'ops/scripts/local/install.sh' package.json
          grep -q 'ops/scripts/local/start.sh' package.json
          grep -q 'ops/scripts/local/stop.sh' package.json
          grep -q 'ops/scripts/local/uninstall.sh' package.json
          grep -q 'ops/docker/docker-compose.yml' ops/scripts/local/install.sh
          grep -q 'ops/docker/docker-compose.yml' ops/scripts/local/start.sh
          grep -q 'ops/docker/docker-compose.yml' ops/scripts/local/stop.sh
          grep -q 'ops/docker/docker-compose.yml' ops/scripts/local/uninstall.sh

      - name: Build distribution package
        run: npm run dist:package

      - name: Upload distribution integrity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-integrity
          path: |
            dist/*.tar.gz
            dist/CHECKSUMS.txt
            dist/CHECKSUMS.txt.sig
            dist/CHECKSUMS.txt.pub
