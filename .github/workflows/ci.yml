name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root tooling
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint

      - name: Check formatting (advisory)
        continue-on-error: true
        run: npm run format:check

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: root
            workingDirectory: .
            lockfile: package-lock.json
          - target: server
            workingDirectory: server
            lockfile: server/package-lock.json
          - target: web
            workingDirectory: web
            lockfile: web/package-lock.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install dependencies (${{ matrix.target }})
        working-directory: ${{ matrix.workingDirectory }}
        run: npm ci

      - name: Run npm audit (${{ matrix.target }})
        id: npm_audit
        working-directory: ${{ matrix.workingDirectory }}
        run: |
          set +e
          npm audit --audit-level=high --json > "${{ github.workspace }}/npm-audit-${{ matrix.target }}.json"
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload npm audit report (${{ matrix.target }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ matrix.target }}
          path: npm-audit-${{ matrix.target }}.json

      - name: Enforce high/critical policy (${{ matrix.target }})
        if: steps.npm_audit.outputs.status != '0'
        run: |
          echo "Falha no npm audit para ${{ matrix.target }} (nivel high/critical)."
          exit 1

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Run backend tests
        working-directory: server
        run: npm test

  frontend-build:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend CSS
        working-directory: web
        run: npm run build:css

      - name: Validate frontend script syntax
        run: node --check web/script.js

      - name: Validate required UI entrypoints
        run: |
          grep -q 'id="msg"' web/index.html
          grep -q 'id="sendBtn"' web/index.html
          grep -q 'id="chat"' web/index.html

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose file
        run: docker compose config -q

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: false
          tags: meu-chat-local-server:ci
