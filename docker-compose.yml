services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama:/models
    ports:
      - "11434:11434"
    restart: unless-stopped

  server:
    build: ./server
    container_name: chat-server
    environment:
      - OLLAMA_HOST=http://ollama:11434
    ports:
      - "3001:3001"
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:

